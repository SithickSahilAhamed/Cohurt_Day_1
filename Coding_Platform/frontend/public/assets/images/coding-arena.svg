<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#0F172A"/>
  <rect x="50" y="100" width="200" height="200" rx="20" fill="#1E293B" stroke="#4F46E5" stroke-width="4"/>
  <circle cx="150" cy="150" r="30" fill="#4F46E5" opacity="0.3"/>
  <text x="100" y="200" font-family="monospace" fill="#4F46E5" font-size="14">Player 1</text>
  <text x="80" y="230" font-family="monospace" fill="#4F46E5" font-size="12">{ code: 'ready' }</text>
  <rect x="350" y="100" width="200" height="200" rx="20" fill="#1E293B" stroke="#7C3AED" stroke-width="4"/>
  <circle cx="450" cy="150" r="30" fill="#7C3AED" opacity="0.3"/>
  <text x="400" y="200" font-family="monospace" fill="#7C3AED" font-size="14">Player 2</text>
  <text x="380" y="230" font-family="monospace" fill="#7C3AED" font-size="12">{ code: 'ready' }</text>
  <circle cx="300" cy="200" r="40" fill="#DC2626" opacity="0.2"/>
  <text x="280" y="215" font-family="Arial" font-size="24" fill="#DC2626" font-weight="bold">VS</text>
  <path d="M200 300 L300 350 L400 300" stroke="url(#battleGrad)" stroke-width="3" fill="none" stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset" from="0" to="50" dur="2s" repeatCount="indefinite"/>
  </path>
  <defs>
    <linearGradient id="battleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>