<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeBattle</title>
    <link rel="icon" href="public/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <!-- Left Panel - Branding -->
        <div class="auth-left">
            <div class="auth-brand">
                <img src="public/assets/images/logo.svg" alt="CodeBattle" class="auth-logo asset-glow-strong">
                <h1 class="auth-brand-title">CodeBattle</h1>
                <p class="auth-brand-subtitle">Compete. Code. Conquer.</p>
            </div>
            <div class="auth-benefits">
                <div class="benefit-item">
                    <img src="public/assets/icons/multiplayer.svg" alt="Multiplayer" class="benefit-icon asset-hover-scale">
                    <span>Real-time Multiplayer Battles</span>
                </div>
                <div class="benefit-item">
                    <img src="public/assets/icons/leaderboard.svg" alt="Leaderboard" class="benefit-icon asset-hover-scale">
                    <span>Compete on Live Leaderboards</span>
                </div>
                <div class="benefit-item">
                    <img src="public/assets/icons/trophy.svg" alt="Trophy" class="benefit-icon asset-hover-scale">
                    <span>Earn Badges & Recognition</span>
                </div>
            </div>
        </div>

        <!-- Right Panel - Form -->
        <div class="auth-right">
            <div class="auth-form-container">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Login to your CodeBattle account</p>

                <form id="loginForm" class="auth-form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="form-input-wrapper">
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                class="form-input" 
                                placeholder="your@email.com"
                                required
                            >
                            <span class="form-focus-border"></span>
                        </div>
                        <span class="form-error" id="emailError"></span>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="form-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input" 
                                placeholder="••••••••"
                                required
                            >
                            <span class="form-focus-border"></span>
                        </div>
                        <span class="form-error" id="passwordError"></span>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-footer">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <!-- General Error -->
                    <div class="form-error-alert" id="formError"></div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-block">
                        <span class="btn-text">Login</span>
                        <span class="btn-glow"></span>
                    </button>
                </form>

                <!-- Sign Up Link -->
                <p class="auth-footer-text">
                    Don't have an account? 
                    <a href="register.html" class="auth-link">Sign up here</a>
                </p>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>or continue as guest</span>
                </div>

                <!-- Guest Login -->
                <button type="button" id="guestLoginBtn" class="btn btn-secondary btn-block">
                    Continue as Guest
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="public/assets/icons/loading-spinner.svg" alt="Loading" class="loading-spinner">
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if already authenticated
            if (isAuthenticated()) {
                window.location.href = 'dashboard.html';
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const formError = document.getElementById('formError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const guestLoginBtn = document.getElementById('guestLoginBtn');

            // Real-time validation
            emailInput.addEventListener('blur', validateEmail);
            passwordInput.addEventListener('blur', validatePassword);

            function validateEmail() {
                emailError.textContent = '';
                const email = emailInput.value.trim();
                if (!email) {
                    emailError.textContent = 'Email is required';
                    return false;
                }
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailError.textContent = 'Please enter a valid email';
                    return false;
                }
                return true;
            }

            function validatePassword() {
                passwordError.textContent = '';
                const password = passwordInput.value;
                if (!password) {
                    passwordError.textContent = 'Password is required';
                    return false;
                }
                if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    return false;
                }
                return true;
            }

            // Form submission
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                formError.textContent = '';

                if (!validateEmail() || !validatePassword()) {
                    return;
                }

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                loadingOverlay.classList.add('active');

                try {
                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Login failed');
                    }

                    // Store JWT token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    formError.textContent = error.message || 'Login failed. Please try again.';
                    console.error('Login error:', error);
                } finally {
                    loadingOverlay.classList.remove('active');
                }
            });

            // Guest login
            guestLoginBtn.addEventListener('click', function() {
                // Store guest token and user
                localStorage.setItem('token', 'guest-' + Date.now());
                localStorage.setItem('user', JSON.stringify({
                    id: 'guest',
                    username: 'Guest Player',
                    email: 'guest@codebattle.com',
                    avatar: 'public/assets/icons/avatar-default.svg'
                }));
                window.location.href = 'dashboard.html';
            });
        });
    </script>
</body>
</html>
